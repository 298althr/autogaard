<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogaard Business Card v4.0</title>
    <!-- EXACT TYPOGRAPHY IMPORT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- DEPENDENCIES -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            /* EXACT BRAND PALETTE */
            --burgundy: #800020;
            --onyx: #0F172A;
            --slate: #375784;
            --white: #FFFFFF;
            --surface: #F8FAFC;
            --rule: rgba(15, 23, 42, 0.10);

            /* SPACING GRID (Multiples of 8px) */
            --m-36: 36px;
            --g-8: 8px;
            --g-16: 16px;
            --g-24: 24px;
            --g-32: 32px;
            --g-40: 40px;

            /* SCALING (3.5in x 2.1in at 1.8x) */
            --base-width: 3.5in;
            --base-height: 2.1in;
            --scale: 1.8;
            --card-width: calc(var(--base-width) * var(--scale));
            --card-height: calc(var(--base-height) * var(--scale));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        body {
            background-color: #E2E8F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            gap: 60px;
            font-family: 'Inter', sans-serif;
        }

        /* CARD CONTAINER */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: var(--white);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            display: flex;
            flex-direction: column;
        }

        /* BACKGROUND TEXTURE (CSS-ONLY DIAGONAL) */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 10px,
                rgba(15, 23, 42, 0.04) 10px,
                rgba(15, 23, 42, 0.04) 11px
            );
            z-index: 1;
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* FRONT FACE STYLING */
        .front .zone-a {
            padding: var(--m-36);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            height: 48px;
            width: auto;
        }

        .qr-container {
            width: 72px;
            height: 72px;
            background: white;
            border: 1.5px solid var(--onyx);
            border-radius: 6px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zone-b {
            margin-top: auto;
            padding: 0 var(--m-36) 24px var(--m-36);
        }

        .name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 38px;
            color: var(--onyx);
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .separator {
            width: 40px;
            height: 2px;
            background: var(--burgundy);
            margin: 8px 0;
        }

        .title {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 11px;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .zone-c {
            background: var(--onyx);
            padding: 10px var(--m-36);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
        }

        .tagline {
            color: white;
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
        }

        .dot {
            color: var(--burgundy);
            margin: 0 16px;
            font-weight: 800;
        }

        /* BACK FACE STYLING */
        .back .zone-header {
            padding: var(--m-36) var(--m-36) 0 var(--m-36);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 12px;
            color: var(--onyx);
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .header-rule {
            height: 1px;
            background: var(--rule);
            flex-grow: 1;
        }

        .zone-grid {
            padding: 24px var(--m-36);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .service-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: var(--surface);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .service-label-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .label-top {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 9px;
            color: var(--onyx);
            line-height: 1.2;
        }

        .label-bottom {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 8px;
            color: var(--slate);
            line-height: 1.2;
        }

        .coming-soon {
            opacity: 0.55;
        }

        .zone-contact {
            margin-top: auto;
            padding: 0 var(--m-36) var(--m-36) var(--m-36);
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 24px;
        }

        .contact-list {
            display: grid;
            gap: 14px;
            flex: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-circle {
            width: 26px;
            height: 26px;
            background: var(--burgundy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
        }

        .contact-label {
            font-size: 8px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-text {
            font-size: 10px;
            font-weight: 600;
            color: var(--onyx);
        }

        .v-divider {
            width: 1px;
            background: var(--rule);
            margin: 4px 0;
        }

        .address-block {
            text-align: left;
            flex: 1;
            padding-left: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .address-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .address-text {
            font-size: 10px;
            font-weight: 500;
            color: var(--onyx);
            line-height: 1.4;
        }

        /* PRINT STYLES */
        @media print {
            body { background: white; padding: 0; }
            .card {
                box-shadow: none;
                border: 1px solid #EEE;
                page-break-after: always;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <!-- FRONT FACE -->
    <div class="card front">
        <div class="card-content">
            <div class="zone-a">
                <img src="https://res.cloudinary.com/dt6n4pnjb/image/upload/v1772623984/autogaard-png_-_Copy_o0hsnr.png" alt="Autogaard Logo" class="logo">
                <div id="qrcode" class="qr-container"></div>
            </div>

            <div class="zone-b">
                <div class="name">Saviour</div>
                <div class="separator"></div>
                <div class="title">Founder</div>
            </div>

            <div class="zone-c">
                <div class="tagline">
                    Buy Smart <span class="dot">·</span> 
                    Drive Right <span class="dot">·</span> 
                    Fully Managed
                </div>
            </div>
        </div>
    </div>

    <!-- BACK FACE -->
    <div class="card back">
        <div class="card-content">
            <div class="zone-header">
                <div class="header-label">What We Do For You</div>
                <div class="header-rule"></div>
            </div>

            <div class="zone-grid">
                <!-- Slot 1: Car / Sales -->
                <div class="service-tile">
                    <div class="icon-box"><i data-lucide="car" size="18" color="#0F172A"></i></div>
                    <div class="service-label-group">
                        <span class="label-top">Buy Smart</span>
                        <span class="label-bottom">Sales & Purchase</span>
                    </div>
                </div>
                <!-- Slot 2: Search / Valuation -->
                <div class="service-tile">
                    <div class="icon-box"><i data-lucide="search" size="18" color="#0F172A"></i></div>
                    <div class="service-label-group">
                        <span class="label-top">Price It Right</span>
                        <span class="label-bottom">Consultation & Valuation</span>
                    </div>
                </div>
                <!-- Slot 3: Stethoscope / Maintenance -->
                <div class="service-tile">
                    <div class="icon-box"><i data-lucide="stethoscope" size="18" color="#0F172A"></i></div>
                    <div class="service-label-group">
                        <span class="label-top">Keep It Running</span>
                        <span class="label-bottom">Diagnostics & Maintenance</span>
                    </div>
                </div>
                <!-- Slot 4: AI / Coming Soon -->
                <div class="service-tile coming-soon">
                    <div class="icon-box"><i data-lucide="cpu" size="18" color="#0F172A"></i></div>
                    <div class="service-label-group">
                        <span class="label-top">AI Managed</span>
                        <span class="label-bottom">Coming Soon</span>
                    </div>
                </div>
            </div>

            <div class="zone-contact">
                <div class="contact-list">
                    <div class="contact-item">
                        <div class="icon-circle"><i data-lucide="mail" size="12" color="white"></i></div>
                        <div class="contact-info">
                            <span class="contact-label">Reach Us</span>
                            <span class="contact-text">sav-dev@autogaard.com</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="icon-circle"><i data-lucide="globe" size="12" color="white"></i></div>
                        <div class="contact-info">
                            <span class="contact-label">See More</span>
                            <span class="contact-text">www.autogaard.com</span>
                        </div>
                    </div>
                </div>

                <div class="v-divider"></div>

                <div class="address-block">
                    <div class="address-item">
                        <i data-lucide="map-pin" size="12" color="#800020" style="margin-top: 2px;"></i>
                        <span class="address-text">Lekki Phase 1,<br>Lagos, Nigeria</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // INITIALIZE ICONS
        lucide.createIcons();

        // GENERATE QR CODE
        new QRCode(document.getElementById("qrcode"), {
            text: "https://www.autogaard.com",
            width: 62,
            height: 62,
            colorDark : "#0F172A",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
